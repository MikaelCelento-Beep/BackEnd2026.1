<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <!-- Titulo -->
        <h1>{{ msg }}</h1>


        <table border="1">
            <thead> <!-- Cabeçalho da tabela -->
                <th>Nome: </th>
                <th>Idade: </th>
                <th>Nascimento: </th>
                <th>Cursos: </th>
                <th>Turmas: </th>
                <th>Ações: </th>

            </thead>

            <tbody> <!-- Corpo da tabela - Onde vao os dados -->

                {% for aluno in lista %}
                <tr>
                    <td>{{ aluno.nome }}</td>
                    <td>{{ aluno.idade }}</td>
                    <td>{{ aluno.nascimento }}</td>
                    <td>{{ aluno.curso }}</td>
                    <td>{{ aluno.turma }}</td>
                    <td><button>Editar</button>  <button>Excluir</button> </td>
                </tr>                
                {% endfor %}

            </tbody>

        </table>


    </main>
</body>
</html>
